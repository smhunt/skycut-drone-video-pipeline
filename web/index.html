<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SkyCut Chat</title>
<link rel="stylesheet" href="/vendor/plyr.css">
<style>
  :root { --plyr-color-main:#5b9dff; }
  :root { --bg:#0e1116; --panel:#161b23; --border:#252c38; --text:#e6e9ee; --dim:#8b95a5; --accent:#5b9dff; --ok:#4cc38a; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--text); font:15px/1.5 -apple-system,system-ui,sans-serif; height:100vh; display:flex; flex-direction:column; }
  header { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
  header h1 { font-size:16px; font-weight:600; }
  header .sub { color:var(--dim); font-size:13px; flex:1; }
  header button { background:none; border:1px solid var(--border); color:var(--dim); border-radius:8px; padding:6px 12px; cursor:pointer; font-size:13px; }
  header button:hover { color:var(--text); border-color:var(--dim); }
  #log { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; max-width:880px; width:100%; margin:0 auto; }
  /* The log scrolls — its children must never flex-shrink, or stacked players get
     compressed into slivers once content exceeds the viewport. */
  #log > * { flex-shrink:0; }
  .msg { padding:10px 14px; border-radius:12px; max-width:88%; overflow-wrap:break-word; }
  .msg p { margin:0 0 8px; } .msg p:last-child { margin:0; }
  .msg ul { margin:4px 0 8px 20px; } .msg li { margin:2px 0; }
  .msg code { background:#0008; border-radius:4px; padding:1px 5px; font:13px ui-monospace,monospace; }
  .msg table { border-collapse:collapse; margin:6px 0; font-size:13.5px; }
  .msg td, .msg th { border:1px solid var(--border); padding:4px 10px; text-align:left; }
  .msg th { color:var(--dim); font-weight:600; }
  .user { background:var(--accent); color:#fff; align-self:flex-end; }
  .bot  { background:var(--panel); border:1px solid var(--border); align-self:flex-start; }
  .err  { background:#3a1d1d; border:1px solid #6e2c2c; align-self:flex-start; }
  .step { align-self:flex-start; display:flex; align-items:center; gap:10px; padding:6px 12px;
          background:var(--panel); border:1px solid var(--border); border-radius:10px;
          font-size:13px; color:var(--dim); min-width:320px; max-width:88%; }
  .step .icon { width:16px; text-align:center; }
  .step .body { flex:1; min-width:0; }
  .step .label { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .step .elapsed { color:var(--dim); font-variant-numeric:tabular-nums; font-size:12px; }
  .step.done { opacity:.65; } .step.done .icon { color:var(--ok); }
  .bar { height:5px; background:var(--border); border-radius:3px; margin-top:5px; overflow:hidden; display:none; }
  .bar > div { height:100%; background:var(--accent); width:0%; transition:width .4s; }
  .spin { display:inline-block; animation:spin 1.1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .render { align-self:flex-start; width:min(660px,100%); background:var(--panel); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .render .plyr { width:100%; }
  .render .cap { padding:8px 12px; font-size:13px; color:var(--dim); display:flex; justify-content:space-between; }
  .render .cap b { color:var(--text); }
  .render .cap a { color:var(--accent); text-decoration:none; }
  form { display:flex; gap:10px; padding:16px 20px; border-top:1px solid var(--border); max-width:880px; width:100%; margin:0 auto; }
  input { flex:1; background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:12px 14px; color:var(--text); font-size:15px; outline:none; }
  input:focus { border-color:var(--accent); }
  form button { background:var(--accent); border:0; color:#fff; border-radius:10px; padding:0 20px; font-size:15px; cursor:pointer; }
  form button:disabled { opacity:.5; cursor:default; }
  .hint { color:var(--dim); font-size:13px; text-align:center; padding-bottom:10px; }
  .cost { align-self:flex-end; color:var(--dim); font-size:12px; padding:0 6px; font-variant-numeric:tabular-nums; }
  #sessioncost { color:var(--ok); }
  .music { align-self:flex-start; width:min(660px,100%); background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:12px 14px; }
  .music h3 { font-size:14px; margin-bottom:8px; }
  .music .search { display:flex; gap:8px; margin-bottom:10px; }
  .music .search input { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:8px 10px; color:var(--text); font-size:14px; outline:none; }
  .music .search button { background:var(--accent); border:0; color:#fff; border-radius:8px; padding:0 14px; cursor:pointer; }
  .track { display:flex; align-items:center; gap:10px; padding:7px 0; border-top:1px solid var(--border); font-size:13.5px; }
  .track .meta { flex:1; min-width:0; }
  .track .meta .t { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .track .meta .a { color:var(--dim); font-size:12px; }
  .track .lic { color:var(--dim); font-size:11px; border:1px solid var(--border); border-radius:6px; padding:1px 6px; white-space:nowrap; }
  .track audio { height:30px; width:180px; }
  .track button { background:none; border:1px solid var(--accent); color:var(--accent); border-radius:8px; padding:4px 10px; cursor:pointer; font-size:12.5px; white-space:nowrap; }
  .track button:disabled { border-color:var(--border); color:var(--dim); cursor:default; }
  /* ---- timeline panel ---- */
  .tl { align-self:flex-start; width:min(860px,100%); background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:12px 14px; }
  .tl .head { display:flex; align-items:center; gap:10px; margin-bottom:8px; flex-wrap:wrap; }
  .tl .head h3 { font-size:14px; }
  .tl select { background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:5px 8px; font-size:13px; }
  .tl .dur { color:var(--dim); font-size:13px; flex:1; }
  .tl .cmp { color:var(--dim); font-size:13px; display:flex; gap:5px; align-items:center; cursor:pointer; user-select:none; }
  .striplabel { color:var(--dim); font-size:11.5px; margin-top:6px; }
  .strip { display:flex; gap:3px; align-items:stretch; min-height:50px; margin:4px 0; }
  .shot { position:relative; border-radius:8px; background:#20334d; border:1px solid #33507a; padding:5px 7px; min-width:34px; overflow:hidden; font-size:11.5px; line-height:1.3; }
  .strip.drag .shot { cursor:grab; user-select:none; touch-action:none; }
  .strip.drag .shot.dragging { cursor:grabbing; }
  .shot .n { font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .shot .d { color:var(--dim); font-variant-numeric:tabular-nums; }
  .shot.sel { outline:2px solid var(--accent); }
  .shot.dragging { opacity:.4; }
  .shot.dropbefore { box-shadow:-3px 0 0 var(--ok); }
  .shot.dropafter { box-shadow:3px 0 0 var(--ok); }
  .shot.added { border-color:var(--ok); background:#173226; }
  .shot.changed { border-color:#c9a227; background:#332c17; }
  .shot.removed { border-color:#6e2c2c; background:#3a1d1d; opacity:.75; }
  .xf { flex:none; align-self:center; color:var(--dim); font-size:10px; cursor:default; }
  .tl .detail, .tl .diff { border-top:1px solid var(--border); margin-top:8px; padding-top:8px; font-size:12.5px; color:var(--dim); }
  .tl .detail { display:none; } .tl .detail b { color:var(--text); }
  .diff ul { margin:2px 0 2px 18px; } .diff li { margin:2px 0; }
  .diff .add { color:var(--ok); } .diff .del { color:#e57373; } .diff .chg { color:#c9a227; }
  .tl .foot { color:var(--dim); font-size:11.5px; margin-top:8px; }
  /* ---- about modal ---- */
  .overlay { position:fixed; inset:0; background:#000a; display:flex; align-items:center; justify-content:center; z-index:50; }
  .modal { background:var(--panel); border:1px solid var(--border); border-radius:14px; width:min(640px,92vw); max-height:82vh; display:flex; flex-direction:column; }
  .modal .mhead { display:flex; align-items:center; gap:10px; padding:14px 18px; border-bottom:1px solid var(--border); }
  .modal .mhead h2 { font-size:16px; flex:1; }
  .badge { background:var(--accent); color:#fff; font-size:11.5px; border-radius:999px; padding:2px 9px; font-weight:600; }
  .modal .close { background:none; border:0; color:var(--dim); font-size:20px; cursor:pointer; line-height:1; }
  .modal .close:hover { color:var(--text); }
  .tabs { display:flex; gap:6px; padding:10px 18px 0; border-bottom:1px solid var(--border); }
  .tabs button { background:none; border:0; border-bottom:2px solid transparent; color:var(--dim); padding:6px 10px 8px; cursor:pointer; font-size:13.5px; }
  .tabs button.on { color:var(--text); border-bottom-color:var(--accent); }
  .mbody { overflow-y:auto; padding:14px 18px 18px; font-size:14px; }
  .mbody h4 { margin:12px 0 4px; font-size:13.5px; } .mbody h4:first-child { margin-top:0; }
  .mbody .vdate { color:var(--dim); font-weight:400; font-size:12px; }
  .mbody ul { margin:4px 0 4px 20px; } .mbody li { margin:3px 0; }
  .mbody .pri { font-size:11px; border:1px solid var(--border); border-radius:6px; padding:0 6px; color:var(--dim); margin-left:6px; }
  .hw { display:flex; gap:12px; margin:12px 0; }
  .hw .ic { font-size:20px; } .hw .tt { font-weight:600; margin-bottom:2px; }
  .hw .tx { color:var(--dim); font-size:13.5px; }
</style>
</head>
<body>
<header>
  <h1>🎬 SkyCut Chat</h1>
  <span class="badge" id="verbadge"></span>
  <span class="sub"><span id="projstats">loading project…</span><span id="sessioncost"></span></span>
  <button id="timeline">🎞️ Timeline</button>
  <button id="music">🎵 Music</button>
  <button id="renders">Renders</button>
  <button id="about">About</button>
  <button id="reset">New chat</button>
</header>
<div id="log"></div>
<form id="f">
  <input id="q" placeholder="Describe the cut you want…" autocomplete="off" autofocus>
  <button id="send">Send</button>
</form>
<div class="hint">previews are 720p · finals only when you ask · everything is versioned, nothing is lost</div>
<script src="/vendor/plyr.min.js"></script>
<script>
const log = document.getElementById("log"), q = document.getElementById("q"),
      f = document.getElementById("f"), send = document.getElementById("send");

// --- tiny markdown renderer (bold/italic/code/lists/tables) ---
const esc = (s) => s.replace(/[&<>"]/g, (c) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c]));
function md(text) {
  const lines = esc(text).split("\n");
  let html = "", list = false, table = [];
  const inline = (s) => s
    .replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>")
    .replace(/(^|\W)\*([^*]+)\*(?=\W|$)/g, "$1<i>$2</i>")
    .replace(/`([^`]+)`/g, "<code>$1</code>");
  const flushTable = () => {
    if (!table.length) return;
    const rows = table.map((r) => r.split("|").slice(1, -1).map((c) => c.trim()));
    const sep = rows.findIndex((r) => r.every((c) => /^:?-+:?$/.test(c)));
    let t = "<table>";
    rows.forEach((r, i) => {
      if (i === sep) return;
      const tag = sep === 1 && i === 0 ? "th" : "td";
      t += "<tr>" + r.map((c) => `<${tag}>${inline(c)}</${tag}>`).join("") + "</tr>";
    });
    html += t + "</table>"; table = [];
  };
  for (const line of lines) {
    if (/^\s*\|.*\|\s*$/.test(line)) { table.push(line.trim()); continue; }
    flushTable();
    if (/^\s*[-•*] /.test(line)) {
      if (!list) { html += "<ul>"; list = true; }
      html += `<li>${inline(line.replace(/^\s*[-•*] /, ""))}</li>`;
    } else {
      if (list) { html += "</ul>"; list = false; }
      if (line.trim()) html += `<p>${inline(line)}</p>`;
    }
  }
  if (list) html += "</ul>";
  flushTable();
  return html;
}

function addMsg(cls, text) {
  const d = document.createElement("div");
  d.className = "msg " + cls;
  d.innerHTML = md(text);
  log.appendChild(d); log.scrollTop = log.scrollHeight;
  return d;
}
function addRender(ev) {
  const d = document.createElement("div");
  d.className = "render";
  d.innerHTML = `<video playsinline preload="metadata" src="${ev.url}"></video>
    <div class="cap"><span><b>v${ev.version}</b> · ${ev.mode}${ev.duration_s ? ` · ${ev.duration_s}s` : ""} · ${ev.size_mb} MB${ev.elapsed_s ? ` · rendered in ${ev.elapsed_s}s` : ""}</span>
    <a href="${ev.url}" target="_blank">open ↗</a></div>`;
  log.appendChild(d);
  new Plyr(d.querySelector("video"), {
    iconUrl: "/vendor/plyr.svg",
    controls: ["play-large", "play", "progress", "current-time", "duration", "mute", "volume", "fullscreen"],
    ratio: "16:9",
    hideControls: true, // fade out when idle during playback + in fullscreen; back on hover
    clickToPlay: true,
    keyboard: { focused: true }, // space/arrows/f work when the player has focus
  });
  log.scrollTop = log.scrollHeight;
}

// --- step widget: spinner + label + elapsed timer + progress bar ---
const TOOL_LABELS = {
  project_status: "Checking project", search_moments: "Searching footage",
  propose_cut: "Director composing cut", get_timeline: "Reading timeline",
  apply_timeline_edit: "Applying edits", render_preview: "Rendering preview", render_final: "Rendering FINAL",
};
let step = null;
function startStep(label) {
  finishStep();
  const d = document.createElement("div");
  d.className = "step";
  d.innerHTML = `<span class="icon"><span class="spin">◐</span></span>
    <span class="body"><span class="label">${esc(label)}</span><div class="bar"><div></div></div></span>
    <span class="elapsed">0s</span>`;
  log.appendChild(d); log.scrollTop = log.scrollHeight;
  const t0 = Date.now();
  const timer = setInterval(() => {
    d.querySelector(".elapsed").textContent = Math.round((Date.now() - t0) / 1000) + "s";
  }, 1000);
  step = { el: d, timer };
}
function updateStep(text) {
  if (!step) return startStep(text);
  const pct = /\((\d+)%\)\s*$/.exec(text);
  step.el.querySelector(".label").textContent = text.replace(/\s*\(\d+%\)\s*$/, "");
  if (pct) {
    const bar = step.el.querySelector(".bar");
    bar.style.display = "block";
    bar.firstElementChild.style.width = pct[1] + "%";
  }
  log.scrollTop = log.scrollHeight;
}
function finishStep() {
  if (!step) return;
  clearInterval(step.timer);
  step.el.classList.add("done");
  step.el.querySelector(".icon").innerHTML = "✓";
  const bar = step.el.querySelector(".bar div"); if (bar) bar.style.width = "100%";
  step = null;
}

function addCost(ev) {
  const d = document.createElement("div");
  d.className = "cost";
  d.textContent = `turn $${ev.turn_usd.toFixed(3)} · ${(ev.turn_in / 1000).toFixed(1)}k in / ${(ev.turn_out / 1000).toFixed(1)}k out · ${ev.api_calls} API call${ev.api_calls === 1 ? "" : "s"}`;
  log.appendChild(d);
  document.getElementById("sessioncost").textContent = ` · session $${ev.session_usd.toFixed(2)}`;
}

function addDoneStep(label) {
  const d = document.createElement("div");
  d.className = "step done";
  d.innerHTML = `<span class="icon">✓</span><span class="body"><span class="label">${esc(label)}</span></span>`;
  log.appendChild(d);
}

// Restore prior conversation from the server (history survives restarts and reloads).
(async () => {
  try {
    const { transcript } = await (await fetch("/api/transcript")).json();
    for (const ev of transcript ?? []) {
      if (ev.type === "user") addMsg("user", ev.text);
      else if (ev.type === "text") addMsg(/^Server error/.test(ev.text) ? "err" : "bot", ev.text);
      else if (ev.type === "tool") addDoneStep(TOOL_LABELS[ev.name] ?? ev.name);
      else if (ev.type === "render") addRender(ev);
      else if (ev.type === "cost") addCost(ev);
    }
    log.scrollTop = log.scrollHeight;
  } catch { /* fresh session */ }
})();

addMsg("bot", `Hey! I build video cuts from your analyzed footage. Try:
- "propose a 45-second cut of the calmest lake and forest moments, then preview it"
- "show me the best floatplane shots"
- "make shot 3 shorter in v2 and re-render"
- "give me two versions: one energetic, one serene"`);

f.addEventListener("submit", async (e) => {
  e.preventDefault();
  const message = q.value.trim();
  if (!message) return;
  addMsg("user", message);
  q.value = ""; send.disabled = true; q.disabled = true;

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ message }),
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const reader = res.body.getReader(), dec = new TextDecoder();
    let buf = "";
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      let i;
      while ((i = buf.indexOf("\n\n")) !== -1) {
        const chunk = buf.slice(0, i); buf = buf.slice(i + 2);
        if (!chunk.startsWith("data: ")) continue;
        const ev = JSON.parse(chunk.slice(6));
        if (ev.type === "text") { finishStep(); addMsg(/^Server error/.test(ev.text) ? "err" : "bot", ev.text); }
        else if (ev.type === "tool") startStep(TOOL_LABELS[ev.name] ?? ev.name);
        else if (ev.type === "status") updateStep(ev.text);
        else if (ev.type === "render") { finishStep(); addRender(ev); }
        else if (ev.type === "cost") addCost(ev);
      }
    }
    finishStep();
  } catch (err) {
    finishStep();
    addMsg("err", `Connection dropped (${err.message}). Any render still finishes on the server — click **Renders** to see it. Then just keep chatting.`);
  } finally {
    send.disabled = false; q.disabled = false; q.focus();
  }
});

// --- Single-player rule: starting any audio/video pauses every other one ---
// Plyr re-dispatches "play" on its wrapper div, so e.target isn't always the media
// element — resolve it, or we'd pause the very player the user just started.
document.addEventListener(
  "play",
  (e) => {
    const started =
      e.target instanceof HTMLMediaElement ? e.target : e.target?.querySelector?.("audio, video");
    if (!started) return;
    for (const m of document.querySelectorAll("audio, video")) {
      if (m !== started && !m.paused) m.pause();
    }
  },
  true // media events don't bubble — capture phase catches them all
);

// --- Music panel ---
function trackRow(t, container) {
  const row = document.createElement("div");
  row.className = "track";
  row.innerHTML = `<div class="meta"><div class="t">${esc(t.title)}</div><div class="a">${esc(t.artist)} · ${t.duration_s}s</div></div>
    <span class="lic">${esc(t.license)}</span>
    <audio controls preload="none" src="${t.preview_url ?? "/music-preview-missing"}"></audio>
    <button ${t.in_library || t.path ? "disabled" : ""}>${t.in_library || t.path ? "In library ✓" : "Add"}</button>`;
  const btn = row.querySelector("button");
  btn.addEventListener("click", async () => {
    btn.disabled = true; btn.textContent = "Downloading…";
    try {
      const r = await (await fetch("/api/music/download", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ track_id: t.id }) })).json();
      if (r.error) throw new Error(r.error);
      btn.textContent = "In library ✓";
      addMsg("bot", `Added **${t.title}** to the library. Tell me e.g. *"put ${t.title} on v7 and re-render"* to use it.`);
    } catch (e) { btn.disabled = false; btn.textContent = "Add"; addMsg("err", "Download failed: " + e.message); }
  });
  container.appendChild(row);
}

document.getElementById("music").addEventListener("click", async () => {
  const panel = document.createElement("div");
  panel.className = "music";
  panel.innerHTML = `<h3>🎵 Music library</h3>
    <div class="search"><input placeholder="Search royalty-free music… e.g. calm cinematic piano"><button>Search</button></div>
    <div class="results"></div>`;
  log.appendChild(panel); log.scrollTop = log.scrollHeight;
  const results = panel.querySelector(".results");
  const input = panel.querySelector("input");

  const lib = await (await fetch("/api/music/library")).json();
  if (lib.tracks?.length) {
    lib.tracks.forEach((t) => trackRow({ ...t, preview_url: "/music/" + encodeURIComponent(t.file) }, results));
  } else {
    results.innerHTML = '<div class="a" style="color:var(--dim);font-size:13px">Library is empty — search above, or just ask me in chat.</div>';
  }

  const doSearch = async () => {
    const q = input.value.trim();
    if (!q) return;
    results.innerHTML = '<div style="color:var(--dim);font-size:13px">Searching…</div>';
    try {
      const r = await (await fetch("/api/music/search?q=" + encodeURIComponent(q))).json();
      if (r.error) throw new Error(r.error);
      results.innerHTML = "";
      if (!r.tracks.length) results.innerHTML = '<div style="color:var(--dim);font-size:13px">No results — try broader keywords.</div>';
      r.tracks.forEach((t) => trackRow(t, results));
    } catch (e) { results.innerHTML = ""; addMsg("err", "Search failed: " + e.message); }
    log.scrollTop = log.scrollHeight;
  };
  panel.querySelector(".search button").addEventListener("click", doSearch);
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); doSearch(); } });
  input.focus();
});

document.getElementById("renders").addEventListener("click", async () => {
  try {
    const data = await (await fetch("/api/renders")).json();
    if (!data.renders?.length) return addMsg("bot", "No renders on disk yet.");
    addMsg("bot", `All renders for **${data.project}** (newest first):`);
    data.renders.forEach((r) => addRender({ url: r.url, version: r.version ?? "?", mode: r.mode, size_mb: r.size_mb }));
  } catch (err) { addMsg("err", "Couldn't list renders: " + err.message); }
});

document.getElementById("reset").addEventListener("click", async () => {
  await fetch("/api/reset", { method: "POST" });
  log.innerHTML = "";
  addMsg("bot", "Fresh chat. Same project — all timeline versions and renders are still on disk (see **Renders**).");
});

// ---- app metadata (About modal) ----
const APP_VERSION = "0.4.0";

  { version: "0.4.0", date: "2026-07-07", changes: [

// ---- live header stats ----
async function refreshStats() {
  try {
    const s = await (await fetch("/api/status")).json();
    if (s.error) throw new Error(s.error);
    document.getElementById("projstats").textContent =
      `${s.project} · ${s.clips.toLocaleString()} clips · ${s.segments.toLocaleString()} segments · ${s.versions.length} version${s.versions.length === 1 ? "" : "s"}`;
  } catch { document.getElementById("projstats").textContent = "no active project"; }
}
document.getElementById("verbadge").textContent = "v" + APP_VERSION;

// ---- timeline panel ----
const fmtS = (n) => (Math.round(n * 10) / 10) + "s";
const effDur = (c) => (c.out_s - c.in_s) / c.speed;

async function fetchTimeline(version) {
  const r = await (await fetch("/api/timeline" + (version ? "?version=" + version : ""))).json();
  if (r.error) throw new Error(r.error);
  return r;
}

function shotEl(c, i, data) {
  const el = document.createElement("div");
  el.className = "shot";
  el.dataset.id = c.id;
  el.dataset.index = i;
  el.style.flexGrow = String(Math.max(effDur(c), 0.5));
  el.style.flexBasis = "0";
  const src = data.clips[c.clip_id];
  el.title = `${c.label ?? c.id} · ${src?.rel_path ?? c.clip_id} · ${c.in_s}–${c.out_s}s${c.speed !== 1 ? ` @${c.speed}x` : ""}`;
  el.innerHTML = `<div class="n">${esc(c.label ?? c.id)}</div><div class="d">${fmtS(effDur(c))}${c.speed !== 1 ? ` @${c.speed}x` : ""}</div>`;
  return el;
}

function renderStrip(strip, data, { diff, draggable, onReorder, onSelect } = {}) {
  strip.innerHTML = "";
  strip.classList.toggle("drag", !!draggable);
  const clips = data.timeline.clips;
  clips.forEach((c, i) => {
    const el = shotEl(c, i, data);
    if (diff?.has(c.id)) el.classList.add(diff.get(c.id));
    if (onSelect) el.addEventListener("click", () => onSelect(c, el));
    if (draggable) {
      // Pointer-event drag (not HTML5 DnD, which is unreliable in nested
      // flex/scroll containers and dead on touch). Click still selects:
      // a press that never crosses the movement threshold is left alone.
      el.addEventListener("pointerdown", (e) => {
        if (e.button !== 0) return;
        const startX = e.clientX, startY = e.clientY;
        let dragging = false;
        const others = () => [...strip.querySelectorAll(".shot")].filter((s) => s !== el);
        const clearMarks = () => strip.querySelectorAll(".dropbefore,.dropafter").forEach((s) => s.classList.remove("dropbefore", "dropafter"));

        const findTarget = (x, y) => {
          for (const s of others()) {
            const r = s.getBoundingClientRect();
            if (x >= r.left - 4 && x <= r.right + 4 && y >= r.top - 20 && y <= r.bottom + 20) {
              return { s, before: x < r.left + r.width / 2 };
            }
          }
          return null;
        };

        const onMove = (ev) => {
          if (!dragging) {
            if (Math.hypot(ev.clientX - startX, ev.clientY - startY) < 6) return;
            dragging = true;
            el.classList.add("dragging");
            el.setPointerCapture?.(ev.pointerId);
          }
          ev.preventDefault();
          clearMarks();
          const t = findTarget(ev.clientX, ev.clientY);
          if (t) t.s.classList.add(t.before ? "dropbefore" : "dropafter");
        };

        const onUp = (ev) => {
          window.removeEventListener("pointermove", onMove);
          window.removeEventListener("pointerup", onUp);
          window.removeEventListener("pointercancel", onUp);
          if (!dragging) return; // plain click — let the click handler select
          el.classList.remove("dragging");
          clearMarks();
          const t = findTarget(ev.clientX, ev.clientY);
          if (!t) return;
          const targetIndex = [...strip.querySelectorAll(".shot")].indexOf(t.s);
          const targetClip = clips[targetIndex];
          if (!targetClip || targetClip.id === c.id) return;
          // Final index in the post-removal array (applyEdit removes then splices).
          const order = clips.map((x) => x.id).filter((id) => id !== c.id);
          const toIndex = order.indexOf(targetClip.id) + (t.before ? 0 : 1);
          // Suppress the click that follows pointerup after a drag.
          el.addEventListener("click", (ce) => ce.stopImmediatePropagation(), { capture: true, once: true });
          onReorder(c.id, toIndex);
        };

        window.addEventListener("pointermove", onMove);
        window.addEventListener("pointerup", onUp);
        window.addEventListener("pointercancel", onUp);
      });
    }
    strip.appendChild(el);
    if (c.transition_out && i < clips.length - 1) {
      const xf = document.createElement("span");
      xf.className = "xf";
      xf.textContent = "⧓";
      xf.title = `${c.transition_out.style} ${c.transition_out.duration_s}s`;
      strip.appendChild(xf);
    }
  });
}

function diffTimelines(a, b) {
  const A = new Map(a.timeline.clips.map((c, i) => [c.id, { c, i }]));
  const B = new Map(b.timeline.clips.map((c, i) => [c.id, { c, i }]));
  const marksA = new Map(), marksB = new Map(), lines = [];
  for (const [id, { c }] of A) if (!B.has(id)) { marksA.set(id, "removed"); lines.push(`<li class="del">− removed '${esc(c.label ?? id)}'</li>`); }
  for (const [id, { c, i }] of B) {
    if (!A.has(id)) { marksB.set(id, "added"); lines.push(`<li class="add">+ added '${esc(c.label ?? id)}' at position ${i + 1}</li>`); continue; }
    const old = A.get(id);
    const changes = [];
    if (old.c.in_s !== c.in_s || old.c.out_s !== c.out_s) changes.push(`retrimmed ${old.c.in_s}–${old.c.out_s}s → ${c.in_s}–${c.out_s}s`);
    if (old.c.speed !== c.speed) changes.push(`speed ${old.c.speed}x → ${c.speed}x`);
    const t0 = old.c.transition_out, t1 = c.transition_out;
    if (JSON.stringify(t0 ?? null) !== JSON.stringify(t1 ?? null))
      changes.push(t1 ? `transition → ${t1.style} ${t1.duration_s}s` : "transition removed (hard cut)");
    if (old.i !== i) changes.push(`moved ${old.i + 1} → ${i + 1}`);
    if (changes.length) { marksB.set(id, "changed"); lines.push(`<li class="chg">~ '${esc(c.label ?? id)}': ${esc(changes.join(", "))}</li>`); }
  }
  const m0 = a.timeline.music, m1 = b.timeline.music;
  if (JSON.stringify(m0 ?? null) !== JSON.stringify(m1 ?? null))
    lines.push(`<li class="chg">~ music: ${m0 ? esc(m0.path.split("/").pop()) : "none"} → ${m1 ? esc(m1.path.split("/").pop()) : "none"}</li>`);
  if (Math.abs(a.duration_s - b.duration_s) >= 0.1)
    lines.push(`<li>duration ${a.duration_s}s → ${b.duration_s}s</li>`);
  return { marksA, marksB, html: lines.length ? `<ul>${lines.join("")}</ul>` : "<i>No differences.</i>" };
}

document.getElementById("timeline").addEventListener("click", async () => {
  const panel = document.createElement("div");
  panel.className = "tl";
  panel.innerHTML = `<div class="head"><h3>🎞️ Timeline</h3>
      <select class="verA"></select><span class="dur"></span>
      <label class="cmp"><input type="checkbox"> compare with <select class="verB" disabled></select></label>
    </div>
    <div class="striplabel labA" style="display:none"></div>
    <div class="strip stripA"></div>
    <div class="striplabel labB" style="display:none"></div>
    <div class="strip stripB" style="display:none"></div>
    <div class="diff" style="display:none"></div>
    <div class="detail"></div>
    <div class="foot">drag shots to reorder — each drop saves a new version · click a shot for details</div>`;
  log.appendChild(panel); log.scrollTop = log.scrollHeight;

  const $ = (sel) => panel.querySelector(sel);
  const verA = $(".verA"), verB = $(".verB"), cmpBox = $(".cmp input");
  let cur = null;

  const fillVersions = (sel, versions, pick) => {
    sel.innerHTML = versions.map((v) => `<option value="${v}" ${v === pick ? "selected" : ""}>v${v}</option>`).join("");
  };

  const showDetail = (c, el) => {
    panel.querySelectorAll(".shot.sel").forEach((s) => s.classList.remove("sel"));
    el.classList.add("sel");
    const src = cur.clips[c.clip_id];
    $(".detail").style.display = "block";
    $(".detail").innerHTML =
      `<b>${esc(c.label ?? c.id)}</b> (${esc(c.id)}) · source <b>${esc(src?.rel_path ?? c.clip_id)}</b>` +
      ` · trim <b>${c.in_s}–${c.out_s}s</b> of ${src ? fmtS(src.duration_s) : "?"} · speed <b>${c.speed}x</b>` +
      ` · on-screen <b>${fmtS(effDur(c))}</b>` +
      (c.transition_out ? ` · exits via <b>${esc(c.transition_out.style)} ${c.transition_out.duration_s}s</b>` : " · hard cut out");
  };

  const reorder = async (id, toIndex) => {
    try {
      const r = await (await fetch("/api/timeline/edit", {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ base_version: cur.timeline.version, edits: [{ op: "reorder", id, to_index: toIndex }] }),
      })).json();
      if (r.error) throw new Error(r.error);
      addMsg("bot", `🖱️ ${r.summary} (from v${cur.timeline.version}, in the timeline panel). Say *"preview v${r.version}"* to see it.`);
      cur = r;
      fillVersions(verA, r.versions, r.version);
      fillVersions(verB, r.versions.filter((v) => v !== r.version), null);
      draw();
      refreshStats();
    } catch (e) { addMsg("err", "Reorder failed: " + e.message); }
  };

  const draw = () => {
    $(".dur").textContent = `${cur.timeline.clips.length} shots · ${cur.duration_s}s`;
    const comparing = cmpBox.checked;
    renderStrip($(".stripA"), cur, comparing ? { onSelect: showDetail } : { draggable: true, onReorder: reorder, onSelect: showDetail });
    $(".stripB").style.display = comparing ? "flex" : "none";
    $(".labA").style.display = $(".labB").style.display = comparing ? "block" : "none";
    $(".diff").style.display = comparing ? "block" : "none";
    $(".foot").textContent = comparing
      ? "green = added · yellow = changed · red = removed (relative to the left/base version)"
      : "drag shots to reorder — each drop saves a new version · click a shot for details";
  };

  const drawCompare = async () => {
    const base = await fetchTimeline(Number(verB.value));
    const { marksA, marksB, html } = diffTimelines(base, cur);
    $(".labA").textContent = `v${base.timeline.version} (base) · ${base.duration_s}s`;
    $(".labB").textContent = `v${cur.timeline.version} · ${cur.duration_s}s`;
    renderStrip($(".stripA"), base, { diff: marksA });
    renderStrip($(".stripB"), cur, { diff: marksB, onSelect: showDetail });
    $(".diff").innerHTML = html;
    $(".labA").style.display = $(".labB").style.display = "block";
    $(".stripB").style.display = "flex";
    $(".diff").style.display = "block";
  };

  const load = async () => {
    try {
      cur = await fetchTimeline(verA.value ? Number(verA.value) : undefined);
      fillVersions(verA, cur.versions, cur.timeline.version);
      fillVersions(verB, cur.versions.filter((v) => v !== cur.timeline.version), null);
      cmpBox.checked ? drawCompare() : draw();
    } catch (e) {
      panel.querySelector(".head").insertAdjacentHTML("afterend", `<div class="striplabel">${esc(e.message)}</div>`);
    }
  };

  verA.addEventListener("change", load);
  verB.addEventListener("change", () => { if (cmpBox.checked) drawCompare(); });
  cmpBox.addEventListener("change", () => {
    verB.disabled = !cmpBox.checked;
    cmpBox.checked && verB.value ? drawCompare() : draw();
  });
  await load();
  log.scrollTop = log.scrollHeight;
});

// ---- about modal ----
function aboutTab(name) {
  if (name === "Changelog")
    return CHANGELOG.map((v) =>
      `<h4>v${v.version} <span class="vdate">· ${v.date}</span></h4><ul>${v.changes.map((c) => `<li>${esc(c)}</li>`).join("")}</ul>`
    ).join("");
  if (name === "How It Works")
    return HOW_IT_WORKS.map((s) =>
      `<div class="hw"><div class="ic">${s.icon}</div><div><div class="tt">${esc(s.title)}</div><div class="tx">${esc(s.text)}</div></div></div>`
    ).join("");
  return ROADMAP.map((g) =>
    `<h4>${g.icon} ${esc(g.category)}</h4><ul>${g.items.map((i) => `<li>${esc(i.t)}<span class="pri">${i.pri}</span></li>`).join("")}</ul>`
  ).join("");
}

document.getElementById("about").addEventListener("click", () => {
  const overlay = document.createElement("div");
  overlay.className = "overlay";
  const tabs = ["Changelog", "How It Works", "Roadmap"];
  overlay.innerHTML = `<div class="modal">
    <div class="mhead"><h2>🎬 SkyCut</h2><span class="badge">v${APP_VERSION}</span><button class="close">✕</button></div>
    <div class="tabs">${tabs.map((t, i) => `<button data-tab="${t}" class="${i === 0 ? "on" : ""}">${t}</button>`).join("")}</div>
    <div class="mbody">${aboutTab(tabs[0])}</div></div>`;
  overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.remove(); });
  overlay.querySelector(".close").addEventListener("click", () => overlay.remove());
  overlay.querySelectorAll(".tabs button").forEach((b) =>
    b.addEventListener("click", () => {
      overlay.querySelectorAll(".tabs button").forEach((x) => x.classList.remove("on"));
      b.classList.add("on");
      overlay.querySelector(".mbody").innerHTML = aboutTab(b.dataset.tab);
    })
  );
  document.body.appendChild(overlay);
});
</script>
