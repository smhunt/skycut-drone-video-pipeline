<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SkyCut Chat</title>
<style>
  :root { --bg:#0e1116; --panel:#161b23; --border:#252c38; --text:#e6e9ee; --dim:#8b95a5; --accent:#5b9dff; --ok:#4cc38a; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--text); font:15px/1.5 -apple-system,system-ui,sans-serif; height:100vh; display:flex; flex-direction:column; }
  header { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
  header h1 { font-size:16px; font-weight:600; }
  header .sub { color:var(--dim); font-size:13px; flex:1; }
  header button { background:none; border:1px solid var(--border); color:var(--dim); border-radius:8px; padding:6px 12px; cursor:pointer; font-size:13px; }
  header button:hover { color:var(--text); border-color:var(--dim); }
  #log { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; max-width:880px; width:100%; margin:0 auto; }
  .msg { padding:10px 14px; border-radius:12px; max-width:88%; overflow-wrap:break-word; }
  .msg p { margin:0 0 8px; } .msg p:last-child { margin:0; }
  .msg ul { margin:4px 0 8px 20px; } .msg li { margin:2px 0; }
  .msg code { background:#0008; border-radius:4px; padding:1px 5px; font:13px ui-monospace,monospace; }
  .msg table { border-collapse:collapse; margin:6px 0; font-size:13.5px; }
  .msg td, .msg th { border:1px solid var(--border); padding:4px 10px; text-align:left; }
  .msg th { color:var(--dim); font-weight:600; }
  .user { background:var(--accent); color:#fff; align-self:flex-end; }
  .bot  { background:var(--panel); border:1px solid var(--border); align-self:flex-start; }
  .err  { background:#3a1d1d; border:1px solid #6e2c2c; align-self:flex-start; }
  .step { align-self:flex-start; display:flex; align-items:center; gap:10px; padding:6px 12px;
          background:var(--panel); border:1px solid var(--border); border-radius:10px;
          font-size:13px; color:var(--dim); min-width:320px; max-width:88%; }
  .step .icon { width:16px; text-align:center; }
  .step .body { flex:1; min-width:0; }
  .step .label { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .step .elapsed { color:var(--dim); font-variant-numeric:tabular-nums; font-size:12px; }
  .step.done { opacity:.65; } .step.done .icon { color:var(--ok); }
  .bar { height:5px; background:var(--border); border-radius:3px; margin-top:5px; overflow:hidden; display:none; }
  .bar > div { height:100%; background:var(--accent); width:0%; transition:width .4s; }
  .spin { display:inline-block; animation:spin 1.1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .render { align-self:flex-start; width:min(660px,100%); background:var(--panel); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .render video { width:100%; display:block; background:#000; }
  .render .cap { padding:8px 12px; font-size:13px; color:var(--dim); display:flex; justify-content:space-between; }
  .render .cap b { color:var(--text); }
  .render .cap a { color:var(--accent); text-decoration:none; }
  form { display:flex; gap:10px; padding:16px 20px; border-top:1px solid var(--border); max-width:880px; width:100%; margin:0 auto; }
  input { flex:1; background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:12px 14px; color:var(--text); font-size:15px; outline:none; }
  input:focus { border-color:var(--accent); }
  form button { background:var(--accent); border:0; color:#fff; border-radius:10px; padding:0 20px; font-size:15px; cursor:pointer; }
  form button:disabled { opacity:.5; cursor:default; }
  .hint { color:var(--dim); font-size:13px; text-align:center; padding-bottom:10px; }
</style>
</head>
<body>
<header>
  <h1>🎬 SkyCut Chat</h1>
  <span class="sub">DJI Wilderness · 271 clips · 3,020 segments</span>
  <button id="renders">Renders</button>
  <button id="reset">New chat</button>
</header>
<div id="log"></div>
<form id="f">
  <input id="q" placeholder="Describe the cut you want…" autocomplete="off" autofocus>
  <button id="send">Send</button>
</form>
<div class="hint">previews are 720p · finals only when you ask · everything is versioned, nothing is lost</div>
<script>
const log = document.getElementById("log"), q = document.getElementById("q"),
      f = document.getElementById("f"), send = document.getElementById("send");

// --- tiny markdown renderer (bold/italic/code/lists/tables) ---
const esc = (s) => s.replace(/[&<>"]/g, (c) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c]));
function md(text) {
  const lines = esc(text).split("\n");
  let html = "", list = false, table = [];
  const inline = (s) => s
    .replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>")
    .replace(/(^|\W)\*([^*]+)\*(?=\W|$)/g, "$1<i>$2</i>")
    .replace(/`([^`]+)`/g, "<code>$1</code>");
  const flushTable = () => {
    if (!table.length) return;
    const rows = table.map((r) => r.split("|").slice(1, -1).map((c) => c.trim()));
    const sep = rows.findIndex((r) => r.every((c) => /^:?-+:?$/.test(c)));
    let t = "<table>";
    rows.forEach((r, i) => {
      if (i === sep) return;
      const tag = sep === 1 && i === 0 ? "th" : "td";
      t += "<tr>" + r.map((c) => `<${tag}>${inline(c)}</${tag}>`).join("") + "</tr>";
    });
    html += t + "</table>"; table = [];
  };
  for (const line of lines) {
    if (/^\s*\|.*\|\s*$/.test(line)) { table.push(line.trim()); continue; }
    flushTable();
    if (/^\s*[-•*] /.test(line)) {
      if (!list) { html += "<ul>"; list = true; }
      html += `<li>${inline(line.replace(/^\s*[-•*] /, ""))}</li>`;
    } else {
      if (list) { html += "</ul>"; list = false; }
      if (line.trim()) html += `<p>${inline(line)}</p>`;
    }
  }
  if (list) html += "</ul>";
  flushTable();
  return html;
}

function addMsg(cls, text) {
  const d = document.createElement("div");
  d.className = "msg " + cls;
  d.innerHTML = md(text);
  log.appendChild(d); log.scrollTop = log.scrollHeight;
  return d;
}
function addRender(ev) {
  const d = document.createElement("div");
  d.className = "render";
  d.innerHTML = `<video controls preload="metadata" src="${ev.url}"></video>
    <div class="cap"><span><b>v${ev.version}</b> · ${ev.mode}${ev.duration_s ? ` · ${ev.duration_s}s` : ""} · ${ev.size_mb} MB</span>
    <a href="${ev.url}" target="_blank">open ↗</a></div>`;
  log.appendChild(d); log.scrollTop = log.scrollHeight;
}

// --- step widget: spinner + label + elapsed timer + progress bar ---
const TOOL_LABELS = {
  project_status: "Checking project", search_moments: "Searching footage",
  propose_cut: "Director composing cut", get_timeline: "Reading timeline",
  apply_timeline_edit: "Applying edits", render_preview: "Rendering preview", render_final: "Rendering FINAL",
};
let step = null;
function startStep(label) {
  finishStep();
  const d = document.createElement("div");
  d.className = "step";
  d.innerHTML = `<span class="icon"><span class="spin">◐</span></span>
    <span class="body"><span class="label">${esc(label)}</span><div class="bar"><div></div></div></span>
    <span class="elapsed">0s</span>`;
  log.appendChild(d); log.scrollTop = log.scrollHeight;
  const t0 = Date.now();
  const timer = setInterval(() => {
    d.querySelector(".elapsed").textContent = Math.round((Date.now() - t0) / 1000) + "s";
  }, 1000);
  step = { el: d, timer };
}
function updateStep(text) {
  if (!step) return startStep(text);
  const pct = /\((\d+)%\)\s*$/.exec(text);
  step.el.querySelector(".label").textContent = text.replace(/\s*\(\d+%\)\s*$/, "");
  if (pct) {
    const bar = step.el.querySelector(".bar");
    bar.style.display = "block";
    bar.firstElementChild.style.width = pct[1] + "%";
  }
  log.scrollTop = log.scrollHeight;
}
function finishStep() {
  if (!step) return;
  clearInterval(step.timer);
  step.el.classList.add("done");
  step.el.querySelector(".icon").innerHTML = "✓";
  const bar = step.el.querySelector(".bar div"); if (bar) bar.style.width = "100%";
  step = null;
}

addMsg("bot", `Hey! I build video cuts from your analyzed footage. Try:
- "propose a 45-second cut of the calmest lake and forest moments, then preview it"
- "show me the best floatplane shots"
- "make shot 3 shorter in v2 and re-render"
- "give me two versions: one energetic, one serene"`);

f.addEventListener("submit", async (e) => {
  e.preventDefault();
  const message = q.value.trim();
  if (!message) return;
  addMsg("user", message);
  q.value = ""; send.disabled = true; q.disabled = true;

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ message }),
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const reader = res.body.getReader(), dec = new TextDecoder();
    let buf = "";
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      let i;
      while ((i = buf.indexOf("\n\n")) !== -1) {
        const chunk = buf.slice(0, i); buf = buf.slice(i + 2);
        if (!chunk.startsWith("data: ")) continue;
        const ev = JSON.parse(chunk.slice(6));
        if (ev.type === "text") { finishStep(); addMsg(/^Server error/.test(ev.text) ? "err" : "bot", ev.text); }
        else if (ev.type === "tool") startStep(TOOL_LABELS[ev.name] ?? ev.name);
        else if (ev.type === "status") updateStep(ev.text);
        else if (ev.type === "render") { finishStep(); addRender(ev); }
      }
    }
    finishStep();
  } catch (err) {
    finishStep();
    addMsg("err", `Connection dropped (${err.message}). Any render still finishes on the server — click **Renders** to see it. Then just keep chatting.`);
  } finally {
    send.disabled = false; q.disabled = false; q.focus();
  }
});

document.getElementById("renders").addEventListener("click", async () => {
  try {
    const data = await (await fetch("/api/renders")).json();
    if (!data.renders?.length) return addMsg("bot", "No renders on disk yet.");
    addMsg("bot", `All renders for **${data.project}** (newest first):`);
    data.renders.forEach((r) => addRender({ url: r.url, version: r.version ?? "?", mode: r.mode, size_mb: r.size_mb }));
  } catch (err) { addMsg("err", "Couldn't list renders: " + err.message); }
});

document.getElementById("reset").addEventListener("click", async () => {
  await fetch("/api/reset", { method: "POST" });
  log.innerHTML = "";
  addMsg("bot", "Fresh chat. Same project — all timeline versions and renders are still on disk (see **Renders**).");
});
</script>
</body>
</html>
